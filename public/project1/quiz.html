<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クイズ | 石川県の魚クイズ</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="quiz-container">
    <header class="quiz-header">
      <h1>石川県の魚クイズ</h1>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </header>

    <main class="quiz-main">
      <div class="quiz-intro" id="quizIntro">
        <p class="area-chip" id="quizAreaText">選択エリア: 金沢駅</p>
        <p class="map-description" id="spotQuizGuide">金沢駅エリアのクイズを3問出題します。</p>
        <p>石川県の魚に関するクイズです。場所ごとに内容の違う3問に挑戦してください。</p>
        <div class="intro-actions">
          <a class="btn btn-secondary btn-link" href="index.html">マップに戻る</a>
          <button class="btn btn-primary" id="startBtn">スタート</button>
        </div>
      </div>

      <div class="quiz-content hidden" id="quizContent">
        <p class="question-counter" id="questionCounter"></p>
        <span class="difficulty-badge difficulty-normal" id="spotBadge"></span>
        <h2 class="question-text" id="questionText"></h2>
        <ul class="options-list" id="optionsList"></ul>
        <div class="feedback-message hidden" id="feedbackMessage">
          <span class="feedback-icon" id="feedbackIcon"></span>
          <div class="feedback-content">
            <span class="feedback-text" id="feedbackText"></span>
            <p class="feedback-explanation" id="feedbackExplanation"></p>
          </div>
        </div>
        <div class="quiz-nav">
          <button class="btn btn-secondary" id="prevBtn" disabled>前へ</button>
          <button class="btn btn-primary" id="confirmBtn" disabled>決定</button>
          <button class="btn btn-primary" id="nextBtn" disabled>次へ</button>
          <button class="btn btn-primary" id="submitBtn" disabled>結果を見る</button>
        </div>
      </div>

      <div class="quiz-result hidden" id="quizResult">
        <h2>結果</h2>
        <p class="score-display" id="scoreDisplay"></p>
        <p class="result-message" id="resultMessage"></p>
        <div class="result-actions">
          <a class="btn btn-secondary btn-link" href="index.html">マップに戻る</a>
          <button class="btn btn-primary" id="retryBtn">もう一度挑戦</button>
        </div>
      </div>
    </main>
  </div>

  <script src="quiz.js"></script>
</body>
</html>
